<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📱 라이브 마스터 - 모바일 (타이머 자동 동기화)</title>
    <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #09090b; /* Dark Obsidian Black */
            --bg-panel: rgba(18, 18, 24, 0.75); /* Frosted Obsidian Glass */
            --bg-card: rgba(28, 28, 36, 0.85); /* Frosted Obsidian Card */
            --bg-input: rgba(10, 10, 14, 0.8);
            --border-light: rgba(255, 255, 255, 0.08); /* Minimal light border */
            --text-main: #f5f5f7; /* Off-white primary text */
            --text-muted: #8e8e93; /* Apple silver secondary text */
            --accent: #e5c158; /* Amber slate obsidian premium accent */
            --accent-glow: rgba(229, 193, 88, 0.15);
            --success: #30d158; /* Apple green */
            --danger: #ff453a; /* Apple red */
            --danger-glow: rgba(255, 69, 58, 0.2);
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.2);
            --radius-lg: 16px; /* High-end rounded corners */
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            --glass-stroke: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-card: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body.theme-pink {
            --bg-body: #0d0910; /* Dark Obsidian Pink Tint */
            --bg-panel: rgba(28, 18, 36, 0.75);
            --bg-card: rgba(40, 24, 52, 0.85);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-main: #f5f5f7;
            --text-muted: #a8a1b6;
            --accent: #ff3377; /* Deep Premium Pink Accent */
            --accent-glow: rgba(255, 51, 119, 0.2);
            --gold: #ff3377;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            position: relative;
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-sans);
            margin: 0;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 14px calc(90px + env(safe-area-inset-bottom)) 14px;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 -14px 15px -14px;
            padding: 14px 18px;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: var(--glass-stroke);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .eyebrow { 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
        }

        .header h1 { 
            margin: 2px 0 0 0; 
            font-size: 20px; 
            line-height: 1.1; 
            font-weight: 700; 
            letter-spacing: -0.3px;
        }
        
        .reaction-pill {
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            min-height: 38px; 
            padding: 5px 12px;
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.04); 
            border: var(--glass-stroke);
            border-radius: 20px !important;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .reaction-pill span { 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase;
        }

        .tabs {
            position: fixed; 
            left: 12px; 
            right: 12px; 
            bottom: 12px; 
            z-index: 50; 
            display: grid; 
            grid-template-columns: repeat(5, minmax(0, 1fr));
            padding: 4px;
            background: rgba(28, 28, 36, 0.85); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: var(--glass-stroke);
            border-radius: 20px !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .tab-btn {
            min-height: 52px; 
            padding: 6px 2px; 
            border: 0; 
            background: transparent; 
            color: var(--text-muted);
            font-size: 10px; 
            font-weight: 600; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 4px;
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
            border-radius: 14px !important;
        }

        .tab-btn i { font-size: 16px; }

        .tab-btn.active { 
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.08); 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .tab-content { 
            display: none; 
            animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
            padding-bottom: 20px; 
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(4px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .status-grid { 
            display: grid; 
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
            gap: 10px; 
            margin: 4px 0 12px 0; 
        }

        .stat-card {
            min-height: 72px; 
            padding: 12px 14px; 
            background: var(--bg-card); 
            border: var(--glass-stroke);
            border-radius: var(--radius-md) !important;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .stat-card span { 
            display: block; 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600; 
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .stat-card strong { 
            display: block; 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700; 
            overflow-wrap: anywhere;
        }

        .group-box {
            background: var(--bg-card); 
            border: var(--glass-stroke); 
            border-radius: var(--radius-lg) !important;
            padding: 16px; 
            margin-bottom: 12px; 
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .plain-section { padding: 0; margin-top: 4px; background: transparent; border: 0; box-shadow: none; }

        .group-title { 
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 14px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 8px;
        }

        .group-title i { color: var(--accent); }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .launch-row input { min-width: 0; }
        .launch-btn { flex: none; width: 75px; white-space: nowrap; }
        .section-head { display: flex; align-items: center; gap: 8px; margin: 15px 0 8px 0; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
        .section-head h3 { flex: 1; margin: 0; font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text-main); }

        button {
            min-height: 40px; 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-main); 
            border: var(--glass-stroke);
            border-radius: var(--radius-sm) !important;
            padding: 10px 14px; 
            font-weight: 600; 
            font-size: 13px; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            gap: 6px;
            flex: 1; 
            font-family: var(--font-sans);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        button:active { 
            background: rgba(255, 255, 255, 0.12); 
            transform: scale(0.98); 
        }

        button.primary { 
            background: var(--text-main) !important; 
            color: var(--bg-body) !important; 
            border-color: var(--text-main) !important;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1) !important;
        }

        button.primary:active {
            background: rgba(255, 255, 255, 0.85) !important;
        }

        button.danger { 
            background: rgba(255, 69, 58, 0.1) !important; 
            color: var(--danger) !important; 
            border-color: rgba(255, 69, 58, 0.3) !important;
        }

        button.danger:active {
            background: rgba(255, 69, 58, 0.2) !important;
        }

        button.icon-only { flex: none; width: 40px; padding: 0; border-radius: 50% !important; }

        input[type="text"], input[type="number"], select, textarea {
            background: var(--bg-input); 
            border: var(--glass-stroke); 
            border-radius: var(--radius-sm) !important;
            padding: 10px 12px; 
            color: var(--text-main);
            font-size: 14px !important; 
            font-weight: 500; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        textarea { min-height: 120px; resize: vertical; line-height: 1.4; }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: rgba(255, 255, 255, 0.24); 
            background: rgba(15, 15, 20, 0.9);
        }

        .toggle-row {
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px; 
            width: 100%; 
            min-height: 46px; 
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px; 
            border: var(--glass-stroke);
            border-radius: var(--radius-sm) !important;
        }

        .toggle-row span { color: var(--text-main); font-size: 13px; font-weight: 500; }

        /* Premium iOS style switches */
        .apple-switch { position: relative; display: inline-block; width: 48px; height: 26px; flex-shrink: 0; }
        .apple-switch input { opacity: 0; width: 0; height: 0; }
        .apple-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.12); border-radius: 13px !important; transition: .25s cubic-bezier(0.16, 1, 0.3, 1); }
        .apple-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; top: 3px; background-color: #ffffff; border-radius: 50% !important; transition: .25s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 3px 8px rgba(0,0,0,0.4); }
        .apple-switch input:checked + .apple-slider { background-color: var(--success); }
        body.theme-pink .apple-switch input:checked + .apple-slider { background-color: var(--accent); }
        .apple-switch input:checked + .apple-slider:before { transform: translateX(22px); }

        .m-card {
            position: relative; 
            background: var(--bg-card); 
            border: var(--glass-stroke); 
            border-radius: var(--radius-md) !important;
            padding: 14px; 
            margin-bottom: 10px; 
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .m-card-top { display: flex; gap: 8px; margin-bottom: 10px; }
        .m-card-mid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 10px; font-size: 12px; font-weight: 600; background: transparent !important; padding: 0 !important; }
        
        .metric { 
            min-width: 0; 
            padding: 10px; 
            background: rgba(255, 255, 255, 0.02); 
            border: var(--glass-stroke); 
            border-radius: var(--radius-sm) !important;
        }

        .metric span { 
            display: block; 
            margin-top: 4px; 
            color: var(--text-main) !important; 
            font-size: 16px !important; 
            font-weight: 700; 
            overflow-wrap: anywhere;
        }

        .metric.gold { color: var(--gold); }
        .metric.accent { color: var(--accent); }
        .metric.full { grid-column: 1 / -1; }
        .m-card-bot { display: flex; gap: 6px; }
        .m-card-bot input { flex: 2; min-width: 0; }
        .m-card-bot button { flex: 1; }
        
        .locked-card { 
            background: rgba(255, 255, 255, 0.02); 
            border-style: dashed;
        }

        .inline-edit { 
            width: 100%; 
            min-width: 0; 
            text-align: center; 
            color: var(--gold) !important; 
            border: 1px solid rgba(255, 204, 0, 0.24) !important; 
            border-radius: var(--radius-sm) !important;
            padding: 6px !important; 
            font-size: 14px !important; 
            font-weight: 700 !important; 
            background: var(--bg-input) !important; 
        }

        .color-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        
        .color-slot { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(255, 255, 255, 0.02); 
            padding: 8px; 
            border: var(--glass-stroke); 
            border-radius: var(--radius-sm) !important;
        }

        .color-slot input[type="color"] { 
            flex: none; 
            width: 32px; 
            height: 32px; 
            padding: 0; 
            border: 0; 
            border-radius: 50% !important;
            cursor: pointer;
            overflow: hidden;
        }

        .color-slot button { min-height: 32px; padding: 6px 10px; font-size: 11px; }

        .log-box { 
            background: rgba(0, 0, 0, 0.2); 
            border: var(--glass-stroke); 
            border-radius: var(--radius-md) !important;
            padding: 12px; 
            height: 200px; 
            overflow-y: auto; 
            font-size: 12px; 
            color: var(--text-main); 
            line-height: 1.6; 
            margin-bottom: 8px; 
        }

        .log-item { 
            padding: 6px 0; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
        }

        .log-item:last-child { border-bottom: 0; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="eyebrow" style="display: flex; align-items: center; gap: 8px;">
                <span>Live Master</span>
                <a href="/controller?mode=desktop" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 10px; border: 1px solid rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 10px; transition: all 0.2s;"><i class="fa-solid fa-laptop"></i> PC 버전</a>
                <a href="/logout" style="color: rgba(255,69,58,0.7); text-decoration: none; font-size: 10px; border: 1px solid rgba(255,69,58,0.3); padding: 1px 6px; border-radius: 10px; transition: all 0.2s;"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</a>
            </div>
            <h1>모바일 제어</h1>
        </div>
        <label class="reaction-pill">
            <i class="fa-solid fa-eye" id="icon-reaction"></i>
            <span id="lbl-reaction-mode">대기</span>
            <div class="apple-switch"><input type="checkbox" id="chk-reaction" onchange="toggleOption('reaction_mode')"><span class="apple-slider"></span></div>
        </label>
    </div>

    <div id="active-broadcast-area" style="display: none;">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-match')"><i class="fa-solid fa-stopwatch"></i><span>대결 제어</span></button>
        <button class="tab-btn" onclick="openTab(event, 'tab-neon')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>조명 & 이펙트</span></button>
        <button class="tab-btn" onclick="openTab(event, 'tab-news')"><i class="fa-solid fa-bullhorn"></i><span>설정 & 로그</span></button>
    </div>

    <!-- 1. 대결 제어 탭 (기본 활성화) -->
    <div id="tab-match" class="tab-content active">
        <div class="status-grid">
            <div class="stat-card"><span>타이머</span><strong id="stat-timer">00:00</strong></div>
            <div class="stat-card"><span>대결 상태</span><strong id="stat-match-state">대기</strong></div>
            <div class="stat-card"><span>총합 점수</span><strong id="stat-total">0</strong></div>
            <div class="stat-card"><span>방송 목표</span><strong id="stat-goal">0</strong></div>
        </div>
        
        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-stopwatch"></i> 타이머 제어</div>
            
            <!-- 원터치 퀵 프리셋 설정 -->
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;">시간 퀵 설정</div>
            <div class="control-row" style="margin-bottom: 15px; flex-wrap: wrap; gap: 6px;">
                <button type="button" onclick="quickSetTimer(3)" style="padding: 8px 0;">3분</button>
                <button type="button" onclick="quickSetTimer(5)" style="padding: 8px 0;">5분</button>
                <button type="button" onclick="quickSetTimer(10)" style="padding: 8px 0;">10분</button>
                <button type="button" onclick="quickSetTimer(1)" style="padding: 8px 0;">1분</button>
            </div>
            
            <!-- 시간 추가 제어 -->
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;">시간 추가</div>
            <div class="control-row" style="margin-bottom: 20px; gap: 6px;">
                <button type="button" onclick="addTimerTime(30)" style="padding: 8px 0; background: rgba(229,193,88,0.1); color: var(--accent); border-color: rgba(229,193,88,0.2);">+30초</button>
                <button type="button" onclick="addTimerTime(60)" style="padding: 8px 0; background: rgba(229,193,88,0.1); color: var(--accent); border-color: rgba(229,193,88,0.2);">+1분</button>
            </div>
            
            <!-- 수동 입력 제어 -->
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;">수동 시간 설정</div>
            <div class="control-row" style="margin-bottom: 15px;">
                <input type="number" id="in-timer-m" value="3" placeholder="분" style="text-align: center;"> <span style="font-weight:bold;">분</span>
                <input type="number" id="in-timer-s" value="0" placeholder="초" style="text-align: center;"> <span style="font-weight:bold;">초</span>
            </div>
            
            <div class="control-row">
                <button onclick="setTimer()"><i class="fa-solid fa-rotate-right"></i> 시간 적용</button>
                <button class="primary" onclick="toggleTimer()" id="btn-timer-toggle"><i class="fa-solid fa-play"></i> 시작</button>
            </div>
        </div>

        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-tv"></i> 대결 화면 설정</div>
            <div class="control-row" style="margin-bottom: 10px;">
                <label class="toggle-row" style="flex: 1;"><span>위젯 표시</span><div class="apple-switch"><input type="checkbox" id="chk-match" onchange="toggleMatch()"><span class="apple-slider"></span></div></label>
            </div>
            <div class="control-row" style="margin-bottom: 15px;">
                <label class="toggle-row" style="flex: 1;"><span><i class="fa-solid fa-fire" style="color:var(--danger);"></i> 불꽃 효과</span><div class="apple-switch"><input type="checkbox" id="chk-match-fire" onchange="toggleMatchFire()"><span class="apple-slider"></span></div></label>
            </div>
            <input type="text" id="in-match-title" placeholder="대결 타이틀 (선택)" oninput="updateMatchTitle()">
        </div>
    </div>

    <!-- 2. 조명 & 이펙트 탭 -->
    <div id="tab-neon" class="tab-content">
        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-lightbulb"></i> 리액션 조명 제어</div>
            <div class="control-group">
                <button id="btn-rainbow" onclick="triggerNeon('RAINBOW')" style="background: linear-gradient(90deg, #ff453a, #ff9f0a, #ffd60a, #34c759, #007aff, #5856d6); color: #fff;"><i class="fa-solid fa-rainbow"></i> 무지개 네온</button>
                <div class="control-row">
                    <button onclick="triggerNeon('AUDI')"><i class="fa-solid fa-car"></i> 아우디 빔</button>
                    <button onclick="triggerNeon('OFF')" class="danger"><i class="fa-solid fa-power-off"></i> 전체 끄기</button>
                </div>
            </div>
            <div style="height: 1px; background: var(--border-light); margin: 20px 0;"></div>
            <div id="color-slots" class="color-grid"></div>
        </div>

        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-rocket"></i> 특수 자막 발사기</div>
            <div class="control-group">
                <div class="control-row launch-row">
                    <input type="text" id="in-up-text" placeholder="화면 중앙 발사 문구" onkeydown="if(event.key==='Enter') triggerUpText()">
                    <button class="primary" style="flex: none; width: 85px;" onclick="triggerUpText()"><i class="fa-solid fa-paper-plane"></i> 발사</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 설정 & 로그 탭 -->
    <div id="tab-news" class="tab-content">
        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-sliders"></i> 기능 & 환경 설정</div>
            <div class="control-row" style="margin-bottom: 12px;">
                <label style="flex: none; font-size: 13px; font-weight:600; color:var(--text-muted); width: 70px;">테마 설정:</label>
                <select id="sel-theme" onchange="updateTheme()"><option value="default">기본 다크</option><option value="pink">네온 핑크</option></select>
            </div>
            <div class="control-row" style="margin-bottom: 12px;">
                <label style="flex: none; font-size: 13px; font-weight:600; color:var(--text-muted); width: 70px;">목표 설정:</label>
                <input type="number" id="in-goal" placeholder="목표 점수" onchange="updateGoal()">
            </div>
            <div class="control-row">
                <label class="toggle-row" style="flex: 1;"><span>점수 팝업</span><div class="apple-switch"><input type="checkbox" id="chk-popup" onchange="toggleOption('popup_enabled')"><span class="apple-slider"></span></div></label>
                <label class="toggle-row" style="flex: 1;"><span>1등 탈환</span><div class="apple-switch"><input type="checkbox" id="chk-takeover" onchange="toggleOption('takeover_enabled')"><span class="apple-slider"></span></div></label>
            </div>
        </div>

        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-bullhorn"></i> 전광판 설정</div>
            <label class="toggle-row" style="margin-bottom: 15px;"><span style="font-weight:bold;">화면에 표시하기</span><div class="apple-switch"><input type="checkbox" id="chk-ticker" onchange="toggleOption('ticker_enabled')"><span class="apple-slider"></span></div></label>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 13px; font-weight:bold; color:var(--text-muted);">스크롤 속도: <span id="lbl-speed">70</span></label>
                <input type="range" id="in-speed" min="1" max="100" onchange="updateSpeed(this.value)" style="width:100%; margin-top:10px; accent-color: var(--accent);">
            </div>
            <textarea id="in-ticker" placeholder="문구를 입력하세요. (엔터로 구분)" style="height: 120px;" oninput="updateTickerText()"></textarea>
        </div>

        <div class="group-box">
            <div class="group-title"><i class="fa-solid fa-list-ol"></i> 실시간 로그</div>
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;">랭킹 로그</div>
            <div id="log-box-ranking" class="log-box" style="height: 120px;"></div>
            <button style="width: 100%; margin-bottom: 15px; padding: 6px;" onclick="clearLogs('rank')"><i class="fa-solid fa-trash-can"></i> 랭킹 로그 비우기</button>
            
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;">대결 로그</div>
            <div id="log-box-match" class="log-box" style="height: 120px;"></div>
            <button style="width: 100%; padding: 6px;" onclick="clearLogs('match')"><i class="fa-solid fa-trash-can"></i> 대결 로그 비우기</button>
        </div>
    </div>
    </div>

    <div id="setup-broadcast-area" style="display: none;">
        <div class="group-box" style="margin: 40px 15px; padding: 30px; text-align: center; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <div style="font-size: 40px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 10px var(--accent-glow);">
                <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <h3 style="margin: 0 0 12px 0; font-size: 18px; font-weight: 800; color: #fff;">방송 대기 중</h3>
            <p style="margin: 0; font-size: 14px; color: var(--text-muted); line-height: 1.6;">
                오늘의 방송이 아직 시작되지 않았습니다.<br>
                PC 제어실에서 플레이어를 등록하고 방송 시작을 진행해주세요.
            </p>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) { 
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active'); 
            evt.currentTarget.classList.add('active'); 
        }
        
        let gd = null; let isPushing = false; 
        let serverTimeOffset = 0;
        let lastColorHtml = ""; let lastRankLogHtml = ""; let lastMatchLogHtml = "";

        async function fetchAPI() {
            if (isPushing) return; 
            try { 
                const res = await fetch('/api/data'); const newData = await res.json(); 
                if (newData && newData.server_time) {
                    serverTimeOffset = newData.server_time - Date.now();
                }
                gd = newData;
                if(!gd.bjs) { gd.bjs = []; }
                else { gd.bjs.forEach(bj => { if(bj.contribution === undefined) bj.contribution = bj.score > 0 ? bj.score : 0; }); }
                if(!gd.match_data) gd.match_data = { active: false, fire_effect: false, is_running: false, time_left_ms: 180000, end_time_ms: 0, players: [{name:'팀 A', score:0}, {name:'팀 B', score:0}] };
                if(!gd.bottom_fixed) gd.bottom_fixed = {name: "운영비", score: 0};
                renderUI(); 
            } catch (e) {}
        }

        function pushAPI() {
            if(!gd) return;
            isPushing = true;
            fetch('/api/data', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(gd) }).catch(e => console.error("⚠️ pushAPI Error:", e));
            setTimeout(() => { isPushing = false; }, 80); 
        }

        function readableTextColor(hex) {
            let clean = String(hex || '').replace('#', '').trim();
            if (clean.length === 3) clean = clean.split('').map(ch => ch + ch).join('');
            if (clean.length !== 6) return '#fff';
            let r = parseInt(clean.slice(0, 2), 16);
            let g = parseInt(clean.slice(2, 4), 16);
            let b = parseInt(clean.slice(4, 6), 16);
            return ((r * 299 + g * 587 + b * 114) / 1000) > 170 ? '#1d1d1f' : '#fff';
        }

        function renderUI() {
            if(document.activeElement.tagName === "INPUT" && !document.activeElement.id.startsWith("chk") || document.activeElement.tagName === "TEXTAREA") return;
            
            let isActive = gd.broadcast_active || false;
            document.getElementById('setup-broadcast-area').style.display = isActive ? 'none' : 'block';
            document.getElementById('active-broadcast-area').style.display = isActive ? 'block' : 'none';
            
            const reactionPill = document.querySelector('.reaction-pill');
            if (reactionPill) {
                reactionPill.style.display = isActive ? 'flex' : 'none';
            }
            
            if (!isActive) {
                return;
            }
            
            const setVal = (id, val) => { let el = document.getElementById(id); if(el && el.value != val) el.value = val; };
            const setChk = (id, val) => { let el = document.getElementById(id); if(el && el.checked !== val) el.checked = val; };
            const setHtml = (id, val) => { let el = document.getElementById(id); if(el && el.innerHTML !== val) el.innerHTML = val; };

            setVal('sel-theme', gd.theme || 'default');
            setVal('in-goal', gd.target_goal);
            
            setChk('chk-reaction', gd.reaction_mode);
            document.getElementById('icon-reaction').style.color = gd.reaction_mode ? "var(--danger)" : "var(--text-main)";
            document.getElementById('icon-reaction').className = gd.reaction_mode ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
            setHtml('lbl-reaction-mode', gd.reaction_mode ? '리액션' : '대기');
            
            setChk('chk-popup', gd.popup_enabled);
            setChk('chk-takeover', gd.takeover_enabled);
            setChk('chk-match', gd.match_data.active);
            setChk('chk-match-fire', gd.match_data.fire_effect || false);
            setChk('chk-ticker', gd.ticker_enabled);

            let totalScore = (gd.bottom_fixed?.score || 0) + gd.bjs.reduce((sum, bj) => sum + (bj.score || 0), 0);
            setHtml('stat-total', totalScore.toLocaleString());
            setHtml('stat-goal', (gd.target_goal || 0).toLocaleString());

            let currentNeon = (gd.effect_trigger && gd.effect_trigger.color !== 'OFF') ? gd.effect_trigger.color : ''; 
            let rbBtn = document.getElementById('btn-rainbow'); 
            if(currentNeon === 'RAINBOW') { 
                if(rbBtn.innerText.indexOf("끄기") === -1) {
                    rbBtn.innerHTML = "<i class='fa-solid fa-rainbow'></i> 무지개 끄기"; rbBtn.style.background = "#1d1d1f"; rbBtn.style.color = "#fff"; 
                }
            } else { 
                if(rbBtn.innerText.indexOf("네온") === -1) {
                    rbBtn.innerHTML = "<i class='fa-solid fa-rainbow'></i> 무지개 네온"; rbBtn.style.background = "linear-gradient(90deg, #ff453a, #ff9f0a, #ffd60a, #34c759, #007aff, #5856d6)"; rbBtn.style.color = "#fff"; 
                }
            }

            if (!gd.saved_colors) gd.saved_colors = ['#ff0055', '#00e5ff', '#ff9100', '#00ff00']; 
            let colorHtml = ''; 
            gd.saved_colors.forEach((col, i) => { 
                let isAct = (currentNeon === col); 
                let textCol = readableTextColor(col);
                let btnStyle = isAct ? `background:#1d1d1f; color:#fff; border-color:${col};` : `background:${col}; color:${textCol}; border-color:${col};`; 
                colorHtml += `<div class="color-slot"><input type="color" value="${col}" onchange="gd.saved_colors[${i}]=this.value; pushAPI();"><button style="${btnStyle}" onclick="triggerNeon('${col}')">${isAct ? '<i class="fa-solid fa-check"></i> ON' : '적용'}</button></div>`; 
            }); 
            if (lastColorHtml !== colorHtml) { document.getElementById('color-slots').innerHTML = colorHtml; lastColorHtml = colorHtml; }

            let md = gd.match_data; 
            setVal('in-match-title', md.title || ''); 
            
            let timerBtn = document.getElementById('btn-timer-toggle');
            let newTimerHtml = md.is_running ? "<i class='fa-solid fa-pause'></i> 정지" : "<i class='fa-solid fa-play'></i> 시작";
            if (timerBtn.innerHTML !== newTimerHtml) {
                timerBtn.innerHTML = newTimerHtml;
                timerBtn.className = md.is_running ? "danger" : "primary";
            }
            
            let totalSec = Math.max(0, Math.ceil((md.is_running ? Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset)) : md.time_left_ms) / 1000)); 
            setVal('in-timer-m', Math.floor(totalSec / 60)); 
            setVal('in-timer-s', totalSec % 60);
            if (totalSec <= 0) {
                setHtml('stat-timer', '시간종료');
            } else {
                setHtml('stat-timer', `${String(Math.floor(totalSec / 60)).padStart(2, '0')}:${String(totalSec % 60).padStart(2, '0')}`);
            }
            setHtml('stat-match-state', md.active ? (md.is_running ? '진행' : '표시') : '숨김');

            setVal('in-speed', gd.ticker_speed || 70); 
            setHtml('lbl-speed', gd.ticker_speed || 70); 
            setVal('in-ticker', (gd.ticker_text||'').replace(/ \/ /g, '\n')); 

            if (gd.logs) {
                let rankLogHtml = gd.logs.map(log => `<div class="log-item"><span style="color:var(--text-muted);">[${log.time}]</span> <span style="font-weight:900;">${log.name}</span> <span style="color:var(--accent); font-weight:900;">${log.val > 0 ? '+'+log.val.toLocaleString() : log.val.toLocaleString()}점</span></div>`).join('');
                if (lastRankLogHtml !== rankLogHtml) { document.getElementById('log-box-ranking').innerHTML = rankLogHtml; lastRankLogHtml = rankLogHtml; }
            }
            if (gd.match_logs) {
                let matchLogHtml = gd.match_logs.map(log => `<div class="log-item"><span style="color:var(--text-muted);">[${log.time}]</span> <span style="font-weight:900;">${log.name}</span> <span style="color:var(--accent); font-weight:900;">${log.val > 0 ? '+'+log.val.toLocaleString() : log.val.toLocaleString()}점</span></div>`).join('');
                if (lastMatchLogHtml !== matchLogHtml) { document.getElementById('log-box-match').innerHTML = matchLogHtml; lastMatchLogHtml = matchLogHtml; }
            }
        }

        function triggerUpText() { let txt = document.getElementById('in-up-text').value; if (txt.trim() === "") { alert("문구를 먼저 입력해주세요!"); return; } gd.up_trigger = { time: Date.now(), text: txt }; pushAPI(); document.getElementById('in-up-text').value = ''; }
        
        function toggleOption(key) { 
            gd[key] = !gd[key]; 
            if (key === 'reaction_mode') {
                let audio = document.getElementById('bgm-audio');
                let md = gd.match_data;
                
                if (gd[key]) { 
                    if (audio && !audio.paused) { audio.dataset.wasPlaying = "true"; audio.pause(); } else if(audio) { audio.dataset.wasPlaying = "false"; }
                    if (md && md.is_running) {
                        md.time_left_ms = Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset));
                        md.is_running = false;
                        md.was_running_before_reaction = true;
                    }
                } else { 
                    if (audio && audio.dataset.wasPlaying === "true") { audio.play().catch(e=>{}); }
                    if (md && md.was_running_before_reaction) {
                        if(md.time_left_ms <= 0) md.time_left_ms = md.paused_time_left;
                        md.end_time_ms = (Date.now() + serverTimeOffset) + md.time_left_ms;
                        md.is_running = true;
                        md.was_running_before_reaction = false;
                    }
                }
            }
            pushAPI(); 
        }

        function toggleMatch() { gd.match_data.active = !gd.match_data.active; pushAPI(); }
        function toggleMatchFire() { gd.match_data.fire_effect = !gd.match_data.fire_effect; pushAPI(); }
        function updateTheme() { gd.theme = document.getElementById('sel-theme').value; pushAPI(); }
        function updateGoal() { gd.target_goal = parseInt(document.getElementById('in-goal').value)||0; pushAPI(); }
        function triggerNeon(color) { if (!gd.reaction_mode && color !== 'OFF') { alert("👀 리액션 모드(눈알 아이콘)가 켜져있어야 화면에 보입니다."); return; } gd.effect_trigger = {time: Date.now(), color: color, infinite: true}; pushAPI(); }

        function clearLogs(type) { if(type === 'rank') gd.logs = []; if(type === 'match') gd.match_logs = []; pushAPI(); }
        function updateMatchTitle() { gd.match_data.title = document.getElementById('in-match-title').value; pushAPI(); }
        
        function quickSetTimer(m) {
            let ms = m * 60 * 1000;
            gd.match_data.paused_time_left = ms;
            gd.match_data.time_left_ms = ms;
            gd.match_data.is_running = false;
            pushAPI();
        }

        function addTimerTime(seconds) {
            let md = gd.match_data;
            let msToAdd = seconds * 1000;
            if (md.is_running) {
                md.end_time_ms += msToAdd;
            } else {
                md.time_left_ms += msToAdd;
            }
            pushAPI();
        }

        function setTimer() { let ms = ((parseInt(document.getElementById('in-timer-m').value)||0)*60 + (parseInt(document.getElementById('in-timer-s').value)||0))*1000; gd.match_data.paused_time_left = ms; gd.match_data.time_left_ms = ms; gd.match_data.is_running = false; pushAPI(); }
        
        function toggleTimer() { 
            let md = gd.match_data; 
            if(md.is_running) { 
                md.time_left_ms = Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset)); 
                md.is_running = false; 
                md.was_running_before_reaction = false;
            } else { 
                if(md.time_left_ms <= 0) md.time_left_ms = md.paused_time_left; 
                md.end_time_ms = (Date.now() + serverTimeOffset) + md.time_left_ms; 
                md.is_running = true; 
                md.was_running_before_reaction = false;
            } 
            pushAPI(); 
        }

        function updateSpeed(val) { gd.ticker_speed = parseInt(val); document.getElementById('lbl-speed').innerText = val; pushAPI(); }
        function updateTickerText() { gd.ticker_text = document.getElementById('in-ticker').value.replace(/\n/g, ' / '); pushAPI(); }

        fetchAPI(); setInterval(fetchAPI, 250);
    </script>
</body>
</html>
